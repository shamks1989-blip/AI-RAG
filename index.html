<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Knowledge Base Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
/* ── Variables ─────────────────────────────────────────────────────────────── */
:root {
  --accent:       #f97316;
  --accent-dark:  #c2410c;
  --accent-dim:   #fed7aa;
  --accent-glow:  rgba(249,115,22,0.12);
  --bg:           #ffffff;
  --bg-2:         #f8f9fa;
  --bg-3:         #f1f3f5;
  --border:       #e0e0e0;
  --text:         #1a1a1a;
  --text-dim:     #6b7280;
  --shadow:       0 2px 8px rgba(0,0,0,0.08);
  --radius:       12px;
  --font:         'DM Sans', system-ui, sans-serif;
  --mono:         'DM Mono', 'Courier New', monospace;
}

/* ── Reset & base ──────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; }

/* ── App shell ─────────────────────────────────────────────────────────────── */
.app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── Header ────────────────────────────────────────────────────────────────── */
.header {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.brand-title { font-size: 1.15rem; font-weight: 600; color: var(--text); }
.brand-sub { font-size: 0.75rem; color: var(--text-dim); font-family: var(--mono); margin-top: 1px; }
.header-badge {
  font-size: 0.7rem; font-family: var(--mono); color: var(--accent);
  background: var(--accent-glow); border: 1px solid var(--accent-dim);
  border-radius: 20px; padding: 3px 10px;
}

/* ── Main layout ───────────────────────────────────────────────────────────── */
.main {
  flex: 1; display: flex; overflow: hidden; justify-content: center;
}

/* ── Chat column ───────────────────────────────────────────────────────────── */
.chat-col {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  padding: 10px 24px 10px; max-width: 860px; width: 100%;
}

/* ── Chat window ───────────────────────────────────────────────────────────── */
.chat-window {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column; gap: 12px;
  padding: 12px; background: var(--bg-2);
  border: 1px solid var(--border); border-radius: var(--radius);
  scroll-behavior: smooth;
}
.chat-window::-webkit-scrollbar { width: 4px; }
.chat-window::-webkit-scrollbar-track { background: transparent; }
.chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── Message bubbles ───────────────────────────────────────────────────────── */
.msg { display: flex; flex-direction: column; max-width: 82%; }
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.assistant { align-self: flex-start; align-items: flex-start; }

.bubble {
  padding: 10px 14px; border-radius: 14px; font-size: 0.9rem;
  line-height: 1.7; word-break: break-word;
}
.msg.user .bubble {
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: #fff; border-bottom-right-radius: 3px;
  box-shadow: 0 2px 10px rgba(249,115,22,0.25);
}
.msg.assistant .bubble {
  background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-bottom-left-radius: 3px;
  box-shadow: var(--shadow);
}
/* Markdown inside assistant bubbles */
.msg.assistant .bubble h1,.msg.assistant .bubble h2,.msg.assistant .bubble h3 { margin: 10px 0 4px; font-size: 1em; }
.msg.assistant .bubble p { margin: 4px 0; }
.msg.assistant .bubble ul,.msg.assistant .bubble ol { padding-left: 18px; margin: 4px 0; }
.msg.assistant .bubble code { font-family: var(--mono); font-size: 0.85em; background: var(--bg-3); padding: 1px 5px; border-radius: 4px; }
.msg.assistant .bubble pre { background: var(--bg-3); border: 1px solid var(--border); border-radius: 8px; padding: 10px; overflow-x: auto; margin: 8px 0; }
.msg.assistant .bubble pre code { background: none; padding: 0; }
.msg.assistant .bubble strong { color: var(--accent-dark); }
.msg.assistant .bubble blockquote { border-left: 3px solid var(--accent-dim); padding-left: 10px; color: var(--text-dim); margin: 6px 0; }
.msg.assistant .bubble table { border-collapse: collapse; width: 100%; font-size: 0.85em; margin: 8px 0; }
.msg.assistant .bubble th,.msg.assistant .bubble td { border: 1px solid var(--border); padding: 5px 8px; }
.msg.assistant .bubble th { background: var(--bg-3); font-weight: 600; }

/* loader bubble */
.msg.loader { align-self: flex-start; }


/* ── Below-chat topic chips ──────────────────────────────────────────────────── */
.chat-chips-area {
  display: none; flex-shrink: 0;
  padding: 5px 0 0;
  border-top: 1px solid var(--border);
  flex-wrap: wrap; gap: 4px; align-items: center;
}
.chat-chips-area.visible { display: flex; }
.chat-chips-label {
  font-size: 0.68rem; font-family: var(--mono); color: var(--text-dim);
  text-transform: uppercase; letter-spacing: .07em; white-space: nowrap; margin-right: 2px;
}
.chat-chips-area .welcome-hint {
  padding: 3px 10px; font-size: 0.74rem;
}

/* ── Input area ────────────────────────────────────────────────────────────── */
.input-area { flex-shrink: 0; padding-top: 6px; }
.input-row { display: flex; gap: 10px; align-items: flex-end; }
.input-wrap { flex: 1; position: relative; }
#query-input {
  width: 100%; resize: none; overflow-y: hidden;
  font-family: var(--font); font-size: 0.95rem; line-height: 1.5;
  padding: 12px 16px; border: 1.5px solid var(--border);
  border-radius: var(--radius); background: var(--bg); color: var(--text);
  outline: none; transition: border-color .2s, box-shadow .2s;
  min-height: 48px; max-height: 130px;
}
#query-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
#query-input::placeholder { color: var(--text-dim); }

.btn-group { display: flex; flex-direction: column; gap: 6px; }
.btn {
  padding: 12px 22px; border: none; border-radius: var(--radius);
  font-family: var(--font); font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-dark); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-secondary { background: var(--bg-3); color: var(--text-dim); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); color: var(--text); }

/* ── Footer ────────────────────────────────────────────────────────────────── */
.footer {
  flex-shrink: 0; border-top: 1px solid var(--border); padding: 6px 20px;
  font-size: 0.72rem; color: var(--text-dim); font-family: var(--mono);
  text-align: center; background: var(--bg-2);
}

/* ── Welcome message ───────────────────────────────────────────────────────── */
.welcome { text-align: center; padding: 80px 24px 40px; }
.welcome-orb {
  width: 64px; height: 64px; border-radius: 18px; margin: 0 auto 20px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; box-shadow: 0 8px 32px rgba(249,115,22,0.25);
}
.welcome h2 { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 10px; letter-spacing: -.3px; }
.welcome p { font-size: 0.95rem; color: var(--text-dim); max-width: 400px; margin: 0 auto; line-height: 1.6; }
.welcome-hints {
  display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 20px;
}
.welcome-hint {
  padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border);
  font-size: 0.76rem; color: var(--text-dim); background: var(--bg);
  cursor: pointer; transition: all .15s;
}
.welcome-hint:hover { border-color: var(--accent-dim); background: var(--accent-glow); color: var(--accent-dark); }

/* ── AI thinking loader ──────────────────────────────────────────────────────── */
@keyframes thinkSpin { to { transform:rotate(360deg); } }
@keyframes thinkGlow { 0%,100%{opacity:1;transform:translate(-50%,-50%) scale(1);box-shadow:0 0 8px var(--accent),0 0 20px var(--accent-dim)} 50%{opacity:.6;transform:translate(-50%,-50%) scale(.82);box-shadow:0 0 4px var(--accent)} }
@keyframes thinkBar  { 0%,100%{height:3px;opacity:.3} 50%{height:16px;opacity:1} }

.thinking-loader { display:flex; align-items:center; gap:14px; padding:10px 16px; background:var(--bg); border:1px solid var(--border); border-radius:14px; border-bottom-left-radius:3px; box-shadow:var(--shadow); width:fit-content; }

.think-orb { position:relative; width:34px; height:34px; flex-shrink:0; }
.think-spin { position:absolute; inset:0; border-radius:50%; border:2px solid transparent; border-top:2px solid var(--accent); border-right:2px solid var(--accent-dim); animation:thinkSpin 1.1s linear infinite; }
.think-spin-2 { position:absolute; inset:5px; border-radius:50%; border:1.5px solid transparent; border-bottom:1.5px solid var(--accent); animation:thinkSpin .75s linear infinite reverse; }
.think-core { position:absolute; top:50%; left:50%; width:9px; height:9px; border-radius:50%; background:var(--accent); animation:thinkGlow 1.8s ease-in-out infinite; }

.think-bars { display:flex; align-items:flex-end; gap:3px; height:18px; }
.think-bars span { width:3px; border-radius:2px; background:var(--accent); animation:thinkBar 1s ease-in-out infinite; }
.think-bars span:nth-child(1){animation-delay:0s}
.think-bars span:nth-child(2){animation-delay:.13s}
.think-bars span:nth-child(3){animation-delay:.26s}
.think-bars span:nth-child(4){animation-delay:.39s}
.think-bars span:nth-child(5){animation-delay:.52s}

/* ── Responsive ────────────────────────────────────────────────────────────── */
@media(max-width:600px){
  .chat-col { padding: 6px 10px 6px; }
  .header { padding: 8px 14px; }
  .welcome { padding: 24px 12px 16px; }
  .welcome-hints { gap: 4px; margin-top: 12px; }
  .welcome-hint { padding: 3px 9px; font-size: 0.68rem; }
  .chat-chips-area { padding: 4px 0 0; gap: 3px; }
  .chat-chips-area .welcome-hint { padding: 2px 8px; font-size: 0.68rem; }
  .input-area { padding-top: 4px; }
}
</style>
</head>
<body>
<div class="app">

  <!-- ── Header ─────────────────────────────────────────────────────────────── -->
  <header class="header">
    <div class="brand">
      <div class="brand-icon">✦</div>
      <div>
        <div class="brand-title">Knowledge Base Agent</div>
        <div class="brand-sub">Powered by AI · Ask anything about your documents</div>
      </div>
    </div>
    <div class="header-badge">AI-Powered</div>
  </header>

  <!-- ── Main ───────────────────────────────────────────────────────────────── -->
  <div class="main">

    <!-- ── Chat column ────────────────────────────────────────────────────────  -->
    <div class="chat-col">

      <!-- Chat window -->
      <div class="chat-window" id="chat-window">
        <div class="welcome">
          <div class="welcome-orb">✦</div>
          <h2>How can I help you today?</h2>
          <p>Ask me anything — I'll search through the knowledge base and give you a precise answer.</p>
          <div class="welcome-hints" id="welcome-hints"></div>
        </div>
      </div>

      <!-- Topic chips (shown after first message) -->
      <div class="chat-chips-area" id="chat-chips-area"></div>

      <!-- Input -->
      <div class="input-area">
        <div class="input-row">
          <div class="input-wrap">
            <textarea id="query-input" rows="1" placeholder="Ask anything… (Enter to send, Shift+Enter for newline)"></textarea>
          </div>
          <div class="btn-group">
            <button class="btn btn-primary" id="send-btn">Send →</button>
            <button class="btn btn-secondary" id="clear-btn">Clear</button>
          </div>
        </div>
      </div>

    </div>

  </div>

  <!-- ── Footer ─────────────────────────────────────────────────────────────── -->
  <div class="footer">
    Knowledge Base Agent · AI-Powered Document Intelligence
  </div>

</div>

<!-- marked.js for markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script>
// ── AI thinking loader HTML ───────────────────────────────────────────────────
const BRAIN_LOADER_HTML = `
<div class="thinking-loader">
  <div class="think-orb">
    <div class="think-spin"></div>
    <div class="think-spin-2"></div>
    <div class="think-core"></div>
  </div>
  <div class="think-bars">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
</div>`;

// ── App state ─────────────────────────────────────────────────────────────────
let history   = [];
let isLoading = false;
let documents = [];

// ── Elements ──────────────────────────────────────────────────────────────────
const chatWindow = document.getElementById('chat-window');
const queryInput = document.getElementById('query-input');
const sendBtn    = document.getElementById('send-btn');
const clearBtn   = document.getElementById('clear-btn');

// ── marked.js config ──────────────────────────────────────────────────────────
marked.setOptions({ breaks: true, gfm: true });

// ── Message helpers ───────────────────────────────────────────────────────────
function addMessage(role, content) {
  const welcome = chatWindow.querySelector('.welcome');
  if (welcome) {
    welcome.remove();
    // Move document titles below the chat window
    const chipsArea = document.getElementById('chat-chips-area');
    if (chipsArea && documents.length) {
      chipsArea.innerHTML =
        `<span class="chat-chips-label">Ask about:</span>` +
        documents.map(d => {
          const title = (d.title || d.source || '').replace(/'/g, "\\'");
          const label = d.title || d.source || '';
          return `<span class="welcome-hint" onclick="setQuery('Tell me about ${title}')">${label}</span>`;
        }).join('');
      chipsArea.classList.add('visible');
    }
  }

  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  if (role === 'loader') {
    wrap.innerHTML = BRAIN_LOADER_HTML;
    wrap.id = 'loader-msg';
  } else {
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'assistant') {
      bubble.innerHTML = marked.parse(content);
    } else {
      bubble.textContent = content;
    }
    wrap.appendChild(bubble);
  }

  chatWindow.appendChild(wrap);
  chatWindow.scrollTop = chatWindow.scrollHeight;
  return wrap;
}

function removeLoader() {
  const el = document.getElementById('loader-msg');
  if (el) el.remove();
}

// ── Send message ──────────────────────────────────────────────────────────────
async function sendMessage() {
  const text = queryInput.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  sendBtn.disabled = true;
  queryInput.value = '';
  autoResize();

  // 1. Add user bubble immediately
  addMessage('user', text);
  const priorHistory = [...history];
  history.push({ role: 'user', content: text });

  // 2. Show loader immediately while fetch runs
  addMessage('loader', '');

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: priorHistory }),
    });

    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(`Server ${resp.status}: ${err}`);
    }

    const data = await resp.json();

    // Hold loader for 1 s minimum so animation is visible
    await new Promise(r => setTimeout(r, 1000));

    removeLoader();
    addMessage('assistant', data.answer);
    history.push({ role: 'assistant', content: data.answer });

  } catch (e) {
    removeLoader();
    addMessage('assistant', `⚠️ **Error:** ${e.message}`);
  } finally {
    isLoading = false;
    sendBtn.disabled = false;
    queryInput.focus();
  }
}

// ── Clear chat ────────────────────────────────────────────────────────────────
clearBtn.addEventListener('click', () => {
  history = [];
  // Hide chips bar
  const chipsArea = document.getElementById('chat-chips-area');
  chipsArea.innerHTML = '';
  chipsArea.classList.remove('visible');
  // Restore welcome screen with hints inside
  chatWindow.innerHTML = `<div class="welcome">
    <div class="welcome-orb">✦</div>
    <h2>How can I help you today?</h2>
    <p>Ask me anything — I'll search through the knowledge base and give you a precise answer.</p>
    <div class="welcome-hints" id="welcome-hints"></div>
  </div>`;
  renderWelcomeHints(document.getElementById('welcome-hints'));
});

// ── Auto-resize textarea ──────────────────────────────────────────────────────
function autoResize() {
  queryInput.style.height = 'auto';
  queryInput.style.height = Math.min(queryInput.scrollHeight, 130) + 'px';
}
queryInput.addEventListener('input', autoResize);

// ── Keyboard send ─────────────────────────────────────────────────────────────
queryInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
sendBtn.addEventListener('click', sendMessage);

function setQuery(text) {
  queryInput.value = text;
  autoResize();
  queryInput.focus();
}

// ── Welcome screen ────────────────────────────────────────────────────────────
function renderWelcomeHints(container) {
  if (!container) return;
  if (!documents.length) { container.innerHTML = ''; return; }
  container.innerHTML = documents.map(d => {
    const title = (d.title || d.source || '').replace(/'/g, "\\'");
    const label = d.title || d.source || '';
    return `<span class="welcome-hint" onclick="setQuery('Tell me about ${title}')">${label}</span>`;
  }).join('');
}

// ── Init: load document titles for welcome hints ───────────────────────────────
(async () => {
  try {
    const resp = await fetch('/api/documents');
    const data = await resp.json();
    documents = data.documents || [];
    renderWelcomeHints(document.getElementById('welcome-hints'));
  } catch (_) {}
})();
</script>
</body>
</html>
